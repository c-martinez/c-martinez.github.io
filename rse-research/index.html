	<script>
		$("#thanks-div").hide();

		var $form = $('form#test-form');
    var url = 'https://script.google.com/macros/s/AKfycbwaZba0agciHS5YdUnBP33XEMxkdiEADOEcNIw4-nOcvzXsAam4qjmW/exec';

		$('#submit-form').on('click', function(e) {
		  e.preventDefault();
		  var jqxhr = $.ajax({
			    type: "GET",
			    url: url,
					dataType: "json",
			    data: $form.serializeObject(),
			    success: function () {
						$("#questions-div").hide();
						$("#thanks-div").show();
			    },
					error: function(data) {
             alert('An error occured. Could not send data!'); // show response from post.

			});
		})
